version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    assignees:
      - "omarkohl"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    ignore:
      # eslint-plugin-react not yet compatible with eslint 10 (issue #380)
      - dependency-name: "eslint"
        versions: [">= 10"]
      # typescript-eslint not yet compatible with typescript 7 (issue #621)
      - dependency-name: "typescript"
        versions: [">= 7"]
    cooldown:
      default-days: 7
    groups:
      all-dependencies:
        patterns:
          - "*"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    assignees:
      - "omarkohl"
    commit-message:
      prefix: "ci"
      include: "scope"
    cooldown:
      default-days: 7
    groups:
      all-dependencies:
        patterns:
          - "*"
